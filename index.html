<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <title>Conferência do Evangelho</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bege:         #e8d4a8;
      --bege-claro:   #f5e9cc;
      --marrom:       #3a2310;
      --marrom-medio: #6b4423;
      --dourado:      #b8893a;
      --texto:        #2c1a0a;
      --muted:        #7a5530;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bege);
      color: var(--texto);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον εὐαγγέλιον";
      position: fixed;
      inset: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.3rem;
      font-style: italic;
      color: rgba(90,55,20,0.08);
      word-break: break-all;
      line-height: 2.2;
      padding: 20px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 56px 24px 40px;
      background: linear-gradient(180deg, rgba(245,233,204,0.96) 0%, rgba(232,212,168,0.85) 100%);
      border-bottom: 1px solid rgba(184,137,58,0.35);
    }

    .hero-titulo-sup {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--marrom);
      margin-bottom: 4px;
    }

    .hero-titulo-principal {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.5rem, 14vw, 7.5rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 0.92;
      color: var(--marrom);
      margin-bottom: 20px;
      text-shadow: 2px 4px 18px rgba(60,35,16,0.18);
    }

    .hero-tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-style: italic;
      color: var(--marrom-medio);
      max-width: 520px;
      margin: 0 auto 24px;
      line-height: 1.6;
    }

    .hero-grego {
      display: inline-block;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--muted);
      border-top: 1px solid rgba(184,137,58,0.4);
      padding-top: 10px;
      margin-top: 8px;
    }

    .hero-grego strong {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--marrom);
    }

    .icone-chama { font-size: 2rem; margin-bottom: 20px; display: block; }

    main {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .aviso {
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(184,137,58,0.45);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 0.88rem;
      color: var(--marrom-medio);
      margin-bottom: 24px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1 1 calc(50% - 4px);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(107,68,35,0.35);
      background: rgba(245,233,204,0.6);
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: left;
      backdrop-filter: blur(4px);
    }

    .tab:hover {
      background: rgba(245,233,204,0.9);
      border-color: var(--dourado);
    }

    .tab .tab-label {
      font-family: "Inter", sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .tab .tab-nome {
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--marrom);
      letter-spacing: 0.01em;
    }

    .tab.active {
      background: linear-gradient(135deg, #f9e4a8, var(--dourado));
      border-color: var(--marrom-medio);
      box-shadow: 0 4px 14px rgba(100,60,20,0.28), 0 0 0 1px rgba(255,255,255,0.5);
      transform: translateY(-1px);
    }

    .tab.active .tab-label { color: rgba(42,20,4,0.7); }
    .tab.active .tab-nome  { color: var(--marrom); }

    .conteudo-dia {
      display: none;
      background: rgba(255,255,255,0.6);
      border-radius: 18px;
      border: 1px solid rgba(184,137,58,0.5);
      padding: 22px 18px 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(60,35,16,0.1);
    }

    .conteudo-dia.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dia-titulo {
      font-family: "Inter", sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--marrom);
      margin-bottom: 2px;
    }

    .dia-tema {
      font-family: "Inter", sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .divisor {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dourado), transparent);
      margin: 12px 0 16px;
    }

    .blocos {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 600px) {
      .blocos { grid-template-columns: 1fr 1fr; }
    }

    .bloco {
      background: linear-gradient(145deg, #fdf5e0, #f5e6c0);
      border: 1px solid rgba(160,110,50,0.45);
      border-radius: 14px;
      padding: 14px 13px 16px;
      box-shadow: 0 2px 10px rgba(80,48,18,0.1);
    }

    .bloco-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bloco-icone {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(60,35,16,0.25);
    }

    .bloco-icone.pdf   { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .bloco-icone.audio { background: linear-gradient(135deg, #5a2d82, #8e44ad); }

    .bloco-titulo {
      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--marrom);
    }

    .arquivo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(184,137,58,0.3);
      margin-bottom: 6px;
      transition: background 0.15s, transform 0.12s;
      text-decoration: none;
      color: inherit;
    }

    .arquivo-item:last-child { margin-bottom: 0; }

    .arquivo-item:hover {
      background: rgba(255,255,255,0.9);
      transform: translateX(3px);
      border-color: var(--dourado);
    }

    .arquivo-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .arquivo-badge.pdf   { background: #fde8e8; color: #c0392b; }
    .arquivo-badge.audio { background: #f0e6f8; color: #7d3c98; }

    .arquivo-nome {
      font-size: 0.88rem;
      color: var(--marrom);
      flex: 1;
    }

    .arquivo-seta { font-size: 0.8rem; color: var(--dourado); }

    .em-breve-bloco {
      text-align: center;
      padding: 28px 16px;
    }

    .em-breve-icone {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
      opacity: 0.5;
    }

    .em-breve-titulo {
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--marrom);
      margin-bottom: 4px;
    }

    .em-breve-sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 16px 32px;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (min-width: 720px) {
      .hero { padding: 64px 24px 48px; }
      main  { padding: 36px 20px 56px; }
      .tab  { flex: 1 1 calc(25% - 6px); }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-titulo-sup" translate="no">Conferência do</div>
    <div class="hero-titulo-principal" translate="no">Evangelho</div>
    <p class="hero-tagline">
      Confrontando as crenças erradas que distorcem a fé<br />
      e desviam o foco de Cristo na igreja atual.
    </p>
    <span class="icone-chama">🔥</span>
    <div class="hero-grego" translate="no">
      <strong>ευαγγελιον</strong>
      <em>Euangelion</em> — palavra grega que significa "boa notícia" ou "boas novas"
    </div>
  </div>

      Materiais exclusivos para participantes · Acesse durante e após as ministrações

      <button class="tab active" data-target="dia1">
        <div class="tab-label">Dia 1</div>
        <div class="tab-nome">09 de Abril</div>
      </button>
