<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <title>Conferência do Evangelho</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bege:         #e8d4a8;
      --marrom:       #3a2310;
      --marrom-medio: #6b4423;
      --dourado:      #b8893a;
      --texto:        #2c1a0a;
      --muted:        #7a5530;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      color: var(--texto);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: url("fundo_site.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(245,233,204,0.15);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 56px 24px 40px;
      background: linear-gradient(180deg, rgba(245,233,204,0.94) 0%, rgba(232,212,168,0.85) 100%);
      border-bottom: 1px solid rgba(184,137,58,0.35);
    }

    .hero-titulo-sup {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--marrom);
      margin-bottom: 4px;
    }

    .hero-titulo-principal {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.5rem, 14vw, 7.5rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 0.92;
      color: var(--marrom);
      margin-bottom: 20px;
      text-shadow: 2px 4px 18px rgba(60,35,16,0.18);
    }

    .hero-tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.6rem, 3.6vw, 2rem);
      font-style: italic;
      font-weight: 700;
      color: var(--marrom-medio);
      max-width: 720px;
      margin: 0 auto 30px;
      line-height: 1.7;
    }

    .hero-grego {
      display: inline-block;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: clamp(1.6rem, 3.6vw, 2rem);
      color: var(--muted);
      border-top: 1px solid rgba(184,137,58,0.4);
      padding-top: 12px;
      margin-top: 10px;
    }

    .hero-grego strong {
      display: block;
      font-size: inherit;
      font-weight: 700;
      color: var(--marrom);
    }

    .icone-chama { font-size: 2rem; margin-bottom: 20px; display: block; }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .aviso {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(184,137,58,0.45);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 0.88rem;
      color: var(--marrom-medio);
      margin-bottom: 24px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1 1 calc(50% - 4px);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(107,68,35,0.35);
      background: rgba(245,233,204,0.85);
      cursor: pointer;
      transition: all 0.18s ease;
      text-align: left;
      backdrop-filter: blur(4px);
    }

    .tab:hover {
      background: rgba(245,233,204,1);
      border-color: var(--dourado);
      transform: translateY(-1px);
    }

    .tab .tab-label {
      font-family: "Inter", sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .tab .tab-nome {
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--marrom);
      letter-spacing: 0.01em;
    }

    .tab.active {
      background: linear-gradient(135deg, #f9e4a8, var(--dourado));
      border-color: var(--marrom-medio);
      box-shadow: 0 4px 14px rgba(100,60,20,0.28), 0 0 0 1px rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .tab.active .tab-label { color: rgba(42,20,4,0.7); }
    .tab.active .tab-nome  { color: var(--marrom); }

    /* ── PAINEL ── */
    .conteudo-dia {
      display: none;
      background: rgba(255,255,255,0.85);
      border-radius: 18px;
      border: 1px solid rgba(184,137,58,0.5);
      padding: 22px 18px 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(60,35,16,0.1);
    }

    .conteudo-dia.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dia-titulo {
      font-family: "Inter", sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--marrom);
      margin-bottom: 2px;
    }

    .dia-tema {
      font-family: "Inter", sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .divisor {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dourado), transparent);
      margin: 12px 0 16px;
    }

    /* ── BLOCOS ── */
    .blocos {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 600px) {
      .blocos { grid-template-columns: 1fr 1fr; }
    }

      background: linear-gradient(145deg, #fdf5e0, #f5e6c0);
      border: 1px solid rgba(160,110,50,0.45);
      border-radius: 14px;
